# Node.js REST API & WebSocket Telemetry Server EKS Configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fleet-management-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              value: "postgresql://admin:admin123@postgres:5432/fleetdb"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: SIMULATOR_INTERVAL_MS
              value: "3000"
            - name: TELEMETRY_DB_SAVE_INTERVAL_MS
              value: "30000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30040
  selector:
    app: backend
